<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRADE MATЯX | You're on the list</title>
  <meta name="description" content="Thank you for joining the TRADE MATЯX early access waitlist.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050b14;
      --bg-soft: #07111c;
      --panel: #0b1622;
      --line: #1e2a38;
      --text: #f8fafc;
      --muted: #9aa4b2;
      --blue: #3b82f6;
      --blue-soft: #60a5fa;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
      --display: "Outfit", sans-serif;
      --body: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.1), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
      font-family: var(--body);
    }

    .shell {
      width: min(720px, 100%);
      padding: 42px;
      border-radius: 24px;
      background: rgba(11, 22, 34, 0.92);
      border: 1px solid rgba(96, 165, 250, 0.16);
      box-shadow: var(--shadow);
    }

    .check {
      width: 64px;
      height: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      margin-bottom: 22px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.18);
      color: var(--blue-soft);
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.04;
      margin-bottom: 16px;
    }

    .lead {
      font-size: 1.1rem;
      font-weight: 600;
      color: #dce7fb;
      margin-bottom: 14px;
    }

    .supporting {
      max-width: 560px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 24px;
      border-radius: 14px;
      border: 1px solid rgba(96, 165, 250, 0.22);
      background: linear-gradient(135deg, var(--blue), #22c7d8);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    @media (max-width: 640px) {
      .shell {
        padding: 32px 24px;
        border-radius: 20px;
      }

      .check {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="check" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M6.75 12.75L10 16L17.25 8.75" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>You're on the list.</h1>
    <p class="lead">Thank you for joining the TRADE MATЯX early access waitlist.</p>
    <p class="supporting">We'll notify you as soon as we launch. Get ready to trade with clarity, structure, and real insight.</p>
    <a class="btn" href="index.html">Back to Home</a>
  </main>
</body>
</html>
